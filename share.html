<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select One Gift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="menu-btn" onclick="showMenu()">☰</button>
    
    <div id="myMenu" class="menu">
        <a href="index.html">home</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
    </div>

    <div class="gift-container" id="giftForm" style="display: block;">
        <h2>Select One Gift</h2>
        <form onsubmit="submitGift(event)">
            <div class="radio-group">
                <label><input type="radio" name="gift" value="iPhone" required> iPhone</label>
                <label><input type="radio" name="gift" value="Laptop"> Laptop</label>
                <label><input type="radio" name="gift" value="Cash Prize"> Cash Prize</label>
            </div>
            <button type="submit" class="submit-btn">Submit Claim</button>
        </form>
    </div>

    <div class="gift-container" id="claimMessage" style="display: none; text-align: center;">
        <h3 id="successText">Congratulations!</h3>
        <p>Please contact Engr. Jeremiah on WhatsApp to process your claim!</p>
        <button class="okay-btn" onclick="goHome()">Okay</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
