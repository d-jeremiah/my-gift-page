<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-icon" onclick="showMenu()">☰</div>
    
    <div id="myMenu" class="menu">
        <a href="index.html">home</a>
        <a href="about.html">about</a>
        <a href="contact.html">contact</a>
    </div>

    <div class="gift-container">
        <h2>Registration Portal</h2>
        <form id="regForm" onsubmit="saveUserAndProceed(event)">
            <div class="input-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" required placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label for="phoneNumber">Phone Number:</label>
                <input type="tel" id="phoneNumber" required placeholder="Enter phone number">
            </div>
            <button type="submit" class="submit-btn">Proceed to Select Gift</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
